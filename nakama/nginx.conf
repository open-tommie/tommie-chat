server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # gzip 圧縮
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # KTX2 テクスチャの MIME タイプ
    types {
        image/ktx2 ktx2;
    }

    # SPA: 存在しないパスは index.html にフォールバック
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静的アセットのキャッシュ
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /textures/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
